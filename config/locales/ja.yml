# ===================================================
# 日本語ロケールファイル
# アプリ独自のメッセージをここに定義する
# （rails-i18n gem が Rails 標準メッセージの日本語訳を提供してくれる）
# ===================================================

ja:
  # --- アプリ全体で使うメッセージ ---
  app_name: "在庫管理システム"

  # --- フラッシュメッセージ ---
  flash:
    created: "%{model}を登録しました"
    updated: "%{model}を更新しました"
    destroyed: "%{model}を削除しました"
    error: "エラーが発生しました。入力内容を確認してください"

  # --- ナビゲーション ---
  nav:
    home: "ホーム"
    sign_in: "ログイン"
    sign_out: "ログアウト"
    sign_up: "新規登録"
