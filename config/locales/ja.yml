# ===================================================
# 日本語ロケールファイル
# アプリ独自のメッセージをここに定義する
# （rails-i18n gem が Rails 標準メッセージの日本語訳を提供してくれる）
# ===================================================

ja:
  # --- アプリ全体で使うメッセージ ---
  app_name: "在庫管理システム"

  # --- フラッシュメッセージ ---
  flash:
    created: "%{model}を登録しました"
    updated: "%{model}を更新しました"
    destroyed: "%{model}を削除しました"
    error: "エラーが発生しました。入力内容を確認してください"

  # --- ナビゲーション ---
  nav:
    home: "ホーム"
    sign_in: "ログイン"
    sign_out: "ログアウト"
    sign_up: "新規登録"

  # --- モデル名・カラム名（バリデーションエラーの日本語化） ---
  activerecord:
    models:
      item: 備品
    attributes:
      item:
        item_code: 商品番号
        name: 備品名
        stock: 在庫数
        order_trigger: 注文トリガー数
        reorder_quantity: 目標補充数
        image: 画像
