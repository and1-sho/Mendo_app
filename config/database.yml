# 開発・テスト: SQLite / 本番: PostgreSQL（Supabase）

default: &default
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  <<: *default
  adapter: sqlite3
  database: storage/development.sqlite3

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  adapter: sqlite3
  database: storage/test.sqlite3

production:
  <<: *default
  adapter: postgresql
  encoding: unicode
  # Supabase Transaction pooler（port 6543）では prepared statement が使えない
  prepared_statements: false
  # 同上。マイグレーションの advisory lock も pooler では無効化する
  advisory_locks: false
  # 例: postgresql://postgres.xxxx:PASSWORD@aws-0-ap-northeast-1.pooler.supabase.com:6543/postgres
  url: <%= ENV["DATABASE_URL"] %>
